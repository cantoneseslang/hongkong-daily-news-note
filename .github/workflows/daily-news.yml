name: Daily Hong Kong News Generator

on:
  push:
    branches:
      - main
  schedule:
    # 通常実行: UTC 22:00 = HKT 06:00（同日）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動実行も可能

# 同時実行を防ぐ
concurrency:
  group: daily-news
  cancel-in-progress: false

permissions:
  contents: write  # リポジトリへの書き込み権限

jobs:
  # メインジョブ: 記事生成と投稿
  generate-daily-news:
    runs-on: ubuntu-latest
    continue-on-error: true  # 失敗してもリトライジョブを実行するため
    env:
      TZ: Asia/Hong_Kong  # HKTタイムゾーンを設定
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴を取得（過去記事チェックのため）
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create config.json from secrets
        run: |
          cat > config.json << EOF
          {
            "news_api": {
              "api_key": "${{ secrets.NEWS_API_KEY }}"
            },
            "world_news_api": {
              "api_key": "${{ secrets.WORLD_NEWS_API_KEY }}"
            },
            "newsdata_io": {
              "api_key": "${{ secrets.NEWSDATA_IO_API_KEY }}"
            },
            "grok_api": {
              "api_key": "${{ secrets.GROK_API_KEY }}",
              "api_url": "https://api.x.ai/v1/chat/completions"
            },
            "openai_api": {
              "api_key": "${{ secrets.OPENAI_API_KEY }}",
              "api_url": "https://api.openai.com/v1/chat/completions"
            },
            "gemini_api": {
              "api_key": "${{ secrets.GEMINI_API_KEY }}",
              "api_url": "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"
            },
            "claude_api": {
              "api_key": "${{ secrets.CLAUDE_API_KEY }}",
              "api_url": "https://api.anthropic.com/v1/messages"
            },
            "note": {
              "state_path": "/tmp/.note-state.json",
              "screenshot_dir": "/tmp/screenshots",
              "timeout": 180000
            },
            "news_sources": {
              "preferred": [
                "scmp.com",
                "thestandard.com.hk",
                "news.rthk.hk",
                "chinadailyhk.com",
                "hk01.com"
              ],
              "excluded": [
                "hongkongfp.com"
              ]
            }
          }
          EOF
          
          # 設定ファイルが正しく作成されたか確認（APIキーは表示しない）
          echo "✅ Config file created"
          if grep -q "\"OPENAI_API_KEY\"" config.json; then
            echo "⚠️  Warning: OPENAI_API_KEY secret may not be set"
          else
            echo "✅ OpenAI API key configured"
          fi
          if grep -q "\"GEMINI_API_KEY\"" config.json; then
            echo "⚠️  Warning: GEMINI_API_KEY secret may not be set"
          else
            echo "✅ Gemini API key configured"
          fi
          if grep -q "\"CLAUDE_API_KEY\"" config.json; then
            echo "⚠️  Warning: CLAUDE_API_KEY secret may not be set"
          else
            echo "✅ Claude API key configured"
          fi
          if grep -q "\"GROK_API_KEY\"" config.json; then
            echo "⚠️  Warning: GROK_API_KEY secret may not be set"
          else
            echo "✅ Grok API key configured"
          fi
      
      - name: Create necessary directories
        run: |
          mkdir -p daily-articles
          mkdir -p logs
      
      - name: Fetch RSS news
        run: |
          echo "📰 Fetching RSS news..."
          python fetch_rss_news.py
      
      - name: Generate article
        run: |
          echo "✍️  Generating article..."
          
          # 今日の日付を取得（HKTタイムゾーン）
          TODAY=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          echo "📅 Today's date (HKT): $TODAY"
          
          LATEST_RSS=$(ls -t daily-articles/rss_news_*.json 2>/dev/null | head -1)
          if [ -z "$LATEST_RSS" ]; then
            echo "❌ Error: No RSS news file found"
            exit 1
          fi
          echo "Using RSS file: $LATEST_RSS"
          
          # Pythonスクリプトを実行（エラー出力を表示）
          if ! python -u generate_article.py "$LATEST_RSS" 2>&1; then
            echo "❌ Error: Article generation failed"
            echo "📂 Current files in daily-articles:"
            ls -lh daily-articles/ || true
            exit 1
          fi
          
          # デバッグ: 生成されたファイルを確認
          echo "📂 Files in daily-articles:"
          ls -lh daily-articles/ || true
          
          # 今日の日付の記事ファイルが生成されたか確認
          EXPECTED_ARTICLE="daily-articles/hongkong-news_${TODAY}.md"
          echo "🔍 Checking for today's article: $EXPECTED_ARTICLE"
          
          if [ ! -f "$EXPECTED_ARTICLE" ]; then
            echo "❌ Error: Today's article file not generated: $EXPECTED_ARTICLE"
            echo "📋 Available files:"
            ls -la daily-articles/ || true
            exit 1
          fi
          
          echo "✅ Today's article generated successfully: $EXPECTED_ARTICLE"
          
          # 画像ファイルの生成確認
          echo "🖼️  画像ファイルの生成確認:"
          mkdir -p images
          IMAGE_COUNT=$(ls -1 images/article-header-*.png 2>/dev/null | wc -l)
          echo "   生成された画像ファイル数: $IMAGE_COUNT"
          if [ "$IMAGE_COUNT" -gt 0 ]; then
            echo "   ✅ 画像ファイルが生成されました:"
            ls -lh images/article-header-*.png | tail -3
          else
            echo "   ⚠️  画像ファイルが生成されていません"
            echo "   📂 imagesディレクトリの内容:"
            ls -la images/ 2>/dev/null || echo "   imagesディレクトリが存在しません"
          fi

      - name: Sanitize and validate article
        run: |
          TODAY=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          ARTICLE="daily-articles/hongkong-news_${TODAY}.md"
          echo "🧪 Sanitizing article: $ARTICLE"
          python -u scripts/sanitize_article.py "$ARTICLE"
      
      - name: Commit and push generated article
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # 生成された記事ファイルと画像ファイルをコミット
          git add daily-articles/hongkong-news_*.md
          git add daily-articles/selected_news_history.json 2>/dev/null || true
          # 画像ファイルも追加（存在する場合）
          mkdir -p images
          echo "🖼️  コミット前の画像ファイル確認:"
          ls -lh images/article-header-*.png 2>/dev/null || echo "   ⚠️  画像ファイルが見つかりません"
          git add images/article-header-*.png 2>/dev/null || echo "   ⚠️  画像ファイルのgit addに失敗"
          
          # ステージングされたファイルを確認
          echo "📋 ステージングされたファイル:"
          git diff --staged --name-only | head -10
          
          # 変更があればコミット
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # HKTタイムゾーンで日付を取得（UTC+8）
            ARTICLE_DATE=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
            git commit -m "📰 Daily news: $ARTICLE_DATE [automated]"
            
            # プッシュ（コンフリクト時は自動解決）
            if git push origin main; then
              echo "✅ Article committed and pushed"
            else
              echo "⚠️  Push failed, resolving conflicts..."
              
              # リモートの最新を取得
              git fetch origin main
              
              # コンフリクトが発生した場合、リモートを優先
              git reset --soft origin/main
              
              # ワークフローファイルの変更を除外
              git restore --staged .github/
              
              # 記事ファイルと画像ファイルを再度追加
              git add daily-articles/hongkong-news_*.md
              git add daily-articles/selected_news_history.json 2>/dev/null || true
              git add images/article-header-*.png 2>/dev/null || true
              
              # 変更があれば再コミット
              if ! git diff --staged --quiet; then
                # HKTタイムゾーンで日付を再取得
                ARTICLE_DATE=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
                git commit -m "📰 Daily news: $ARTICLE_DATE [automated - resolved conflict]"
                git push origin main
                echo "✅ Conflict resolved and pushed"
              else
                echo "ℹ️  No changes to push (article already exists on remote)"
              fi
            fi
          fi
      
      - name: Setup Node.js for note.com posting
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Playwright
        run: |
          echo "📦 Installing Playwright..."
          npm install
          npx playwright install chromium
          echo "✅ Playwright installed"
      
      - name: Post to note.com
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_AUTH_STATE: ${{ secrets.NOTE_AUTH_STATE }}
          NOTE_MAGAZINE_NAME: "毎日AI香港ピックアップニュース"
        run: |
          echo "📮 Posting to note.com..."
          
          # 今日の日付を取得（HKTタイムゾーン）
          TODAY=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          echo "📅 Today's date (HKT): $TODAY"
          
          # 今日の日付の記事ファイルを確認
          TODAY_ARTICLE="daily-articles/hongkong-news_${TODAY}.md"
          
          echo "🔍 Checking for article file: $TODAY_ARTICLE"
          echo "📂 Current directory: $(pwd)"
          echo "📋 All files in daily-articles/:"
          ls -lh daily-articles/ || echo "⚠️  daily-articles directory not found"
          
          if [ ! -f "$TODAY_ARTICLE" ]; then
            echo "❌ Error: Today's article file not found: $TODAY_ARTICLE"
            echo "📋 Available files:"
            ls -lh daily-articles/ || true
            echo "💡 Possible causes:"
            echo "   1. Article generation step failed"
            echo "   2. Date mismatch (expected: $TODAY)"
            echo "   3. File was generated with different name"
            exit 1
          fi
          
          LATEST_ARTICLE="$TODAY_ARTICLE"
          echo "✅ Article file found: $LATEST_ARTICLE"
          echo "📄 Article size: $(wc -c < "$LATEST_ARTICLE") bytes"
          
          # 画像ファイルの存在確認
          echo "🖼️  画像ファイルの確認:"
          mkdir -p images
          ls -lh images/article-header-*.png 2>/dev/null || echo "⚠️  画像ファイルが見つかりません"
          
          # 記事ファイル内のthumbnailパスを確認
          if grep -q "thumbnail:" "$LATEST_ARTICLE"; then
            THUMBNAIL_PATH=$(grep "thumbnail:" "$LATEST_ARTICLE" | sed 's/.*thumbnail: *//' | tr -d '"' | tr -d "'" | head -1)
            echo "📋 記事内のthumbnailパス: $THUMBNAIL_PATH"
            if [ -f "$THUMBNAIL_PATH" ]; then
              echo "✅ 画像ファイルが存在します: $THUMBNAIL_PATH ($(ls -lh "$THUMBNAIL_PATH" | awk '{print $5}'))"
            else
              echo "⚠️  画像ファイルが見つかりません: $THUMBNAIL_PATH"
              echo "📂 現在のディレクトリ構造:"
              find . -name "*.png" -type f 2>/dev/null | head -10 || echo "PNGファイルが見つかりません"
            fi
          else
            echo "⚠️  記事ファイルにthumbnailパスが見つかりません"
          fi
          
          # 認証状態ファイルを作成
          if [ -n "$NOTE_AUTH_STATE" ]; then
            echo "🔑 認証状態を復元中..."
            echo "$NOTE_AUTH_STATE" > /tmp/.note-state.json
            echo "✅ 認証状態を復元しました"
            echo "📄 認証状態ファイルサイズ: $(wc -c < /tmp/.note-state.json) bytes"
          fi
          
          # マガジン名を表示
          if [ -n "$NOTE_MAGAZINE_NAME" ]; then
            echo "📚 マガジン: $NOTE_MAGAZINE_NAME"
          fi
          
          # note.com投稿を実行（公開モード + マガジン追加）
          # マガジン選択が失敗しても続行できるように、エラーをキャッチ
          set +e  # エラーで即座に終了しないようにする
          node note_auto_post.js "$LATEST_ARTICLE" "$NOTE_EMAIL" "$NOTE_PASSWORD" /tmp/.note-state.json --publish --magazine "$NOTE_MAGAZINE_NAME" 2>&1 | tee /tmp/note_post.log
          POST_EXIT_CODE=${PIPESTATUS[0]}
          set -e  # エラー処理を再度有効化

          NOTE_ARTICLE_URL=$(python - <<'PY'
          from pathlib import Path
          import re
          path = Path('/tmp/note_post.log')
          text = path.read_text(encoding='utf-8', errors='ignore') if path.exists() else ''
          matches = re.findall(r'^NOTE_ARTICLE_URL=(.+)$', text, re.MULTILINE)
          print(matches[-1] if matches else '')
          PY
          )
          
          if [ $POST_EXIT_CODE -eq 0 ]; then
            echo "✅ note.com投稿成功"
            if [ -n "$NOTE_ARTICLE_URL" ]; then
              echo "NOTE_ARTICLE_URL=$NOTE_ARTICLE_URL" >> "$GITHUB_ENV"
              echo "📝 note記事URL: $NOTE_ARTICLE_URL"
            else
              echo "⚠️  note記事URLを抽出できませんでした"
            fi
            
            # 更新された認証状態をシークレットに保存（次の実行用）
            if [ -f /tmp/.note-state.json ]; then
              NEW_AUTH_STATE=$(cat /tmp/.note-state.json)
              echo "💾 新しい認証状態を取得しました（手動でシークレットを更新してください）"
              echo "📄 認証状態ファイルサイズ: $(wc -c < /tmp/.note-state.json) bytes"
            fi
          else
            echo "❌ note.com投稿失敗（終了コード: $POST_EXIT_CODE）"
            echo "⚠️  記事は生成されていますが、note.comへの投稿に失敗しました"
            echo "📋 記事ファイル: $LATEST_ARTICLE"
            echo "💡 手動で投稿するか、次回の実行を待ってください"
            # 記事生成は成功しているので、ワークフロー自体は成功として扱う
            # exit 1 をコメントアウト（記事生成は成功しているため）
          fi

      - name: Summary
        if: always()
        run: |
          echo "=========================================="
          echo "🎉 Daily News Generation Complete"
          echo "=========================================="
          TODAY=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          TODAY_ARTICLE="daily-articles/hongkong-news_${TODAY}.md"
          if [ -f "$TODAY_ARTICLE" ]; then
            echo "📁 Today's Article: $TODAY_ARTICLE"
          else
            echo "⚠️  Today's article not found: $TODAY_ARTICLE"
            LATEST_ARTICLE=$(ls -t daily-articles/hongkong-news_*.md 2>/dev/null | head -1 || echo "None")
            echo "📁 Latest Article: $LATEST_ARTICLE"
          fi
          echo "📅 Date (HKT): $TODAY"
          echo "⏰ Execution time (UTC): $(date -u)"
          echo "⏰ Execution time (HKT): $(TZ='Asia/Hong_Kong' date)"
          echo "=========================================="
  
  # リトライジョブ: メインジョブが失敗した場合に1回だけ実行
  retry-daily-news:
    runs-on: ubuntu-latest
    needs: generate-daily-news
    if: needs.generate-daily-news.result == 'failure' && github.event_name != 'workflow_dispatch'  # メインジョブが失敗した場合のみ、手動実行時は除く
    env:
      TZ: Asia/Hong_Kong
      RETRY_COUNT: 1  # リトライ回数を記録
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create config.json from secrets
        run: |
          cat > config.json << EOF
          {
            "news_api": {
              "api_key": "${{ secrets.NEWS_API_KEY }}"
            },
            "world_news_api": {
              "api_key": "${{ secrets.WORLD_NEWS_API_KEY }}"
            },
            "newsdata_io": {
              "api_key": "${{ secrets.NEWSDATA_IO_API_KEY }}"
            },
            "grok_api": {
              "api_key": "${{ secrets.GROK_API_KEY }}",
              "api_url": "https://api.x.ai/v1/chat/completions"
            },
            "openai_api": {
              "api_key": "${{ secrets.OPENAI_API_KEY }}",
              "api_url": "https://api.openai.com/v1/chat/completions"
            },
            "gemini_api": {
              "api_key": "${{ secrets.GEMINI_API_KEY }}",
              "api_url": "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"
            },
            "claude_api": {
              "api_key": "${{ secrets.CLAUDE_API_KEY }}",
              "api_url": "https://api.anthropic.com/v1/messages"
            },
            "note": {
              "state_path": "/tmp/.note-state.json",
              "screenshot_dir": "/tmp/screenshots",
              "timeout": 180000
            },
            "news_sources": {
              "preferred": [
                "scmp.com",
                "thestandard.com.hk",
                "news.rthk.hk",
                "chinadailyhk.com",
                "hk01.com"
              ],
              "excluded": [
                "hongkongfp.com"
              ]
            }
          }
          EOF
          echo "✅ Config file created"
      
      - name: Create necessary directories
        run: |
          mkdir -p daily-articles
          mkdir -p logs
      
      - name: Fetch RSS news (Retry)
        run: |
          echo "🔄 Retry: Fetching RSS news..."
          python fetch_rss_news.py
      
      - name: Generate article (Retry)
        run: |
          echo "🔄 Retry: Generating article..."
          
          TODAY=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          echo "📅 Today's date (HKT): $TODAY"
          
          LATEST_RSS=$(ls -t daily-articles/rss_news_*.json 2>/dev/null | head -1)
          if [ -z "$LATEST_RSS" ]; then
            echo "❌ Error: No RSS news file found"
            exit 1
          fi
          echo "Using RSS file: $LATEST_RSS"
          
          if ! python -u generate_article.py "$LATEST_RSS" 2>&1; then
            echo "❌ Error: Article generation failed"
            exit 1
          fi
          
          EXPECTED_ARTICLE="daily-articles/hongkong-news_${TODAY}.md"
          if [ ! -f "$EXPECTED_ARTICLE" ]; then
            echo "❌ Error: Today's article file not generated: $EXPECTED_ARTICLE"
            exit 1
          fi
          
          echo "✅ Retry: Article generated successfully"
      
      - name: Sanitize and validate article (Retry)
        run: |
          TODAY=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          ARTICLE="daily-articles/hongkong-news_${TODAY}.md"
          echo "🔄 Retry: Sanitizing article..."
          python -u scripts/sanitize_article.py "$ARTICLE"
      
      - name: Commit and push generated article (Retry)
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add daily-articles/hongkong-news_*.md
          git add daily-articles/selected_news_history.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            ARTICLE_DATE=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
            git commit -m "📰 Daily news: $ARTICLE_DATE [automated - retry]"
            
            if git push origin main; then
              echo "✅ Retry: Article committed and pushed"
            else
              git fetch origin main
              git reset --soft origin/main
              git restore --staged .github/
              git add daily-articles/hongkong-news_*.md
              git add daily-articles/selected_news_history.json 2>/dev/null || true
              
              if ! git diff --staged --quiet; then
                ARTICLE_DATE=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
                git commit -m "📰 Daily news: $ARTICLE_DATE [automated - retry resolved conflict]"
                git push origin main
              fi
            fi
          fi
      
      - name: Setup Node.js for note.com posting (Retry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Playwright (Retry)
        run: |
          echo "🔄 Retry: Installing Playwright..."
          npm install
          npx playwright install chromium
      
      - name: Post to note.com (Retry)
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_AUTH_STATE: ${{ secrets.NOTE_AUTH_STATE }}
          NOTE_MAGAZINE_NAME: "毎日AI香港ピックアップニュース"
        run: |
          echo "🔄 Retry: Posting to note.com..."
          
          TODAY=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          TODAY_ARTICLE="daily-articles/hongkong-news_${TODAY}.md"
          
          if [ ! -f "$TODAY_ARTICLE" ]; then
            echo "❌ Error: Today's article file not found: $TODAY_ARTICLE"
            exit 1
          fi
          
          if [ -n "$NOTE_AUTH_STATE" ]; then
            echo "$NOTE_AUTH_STATE" > /tmp/.note-state.json
          fi
          
          set +e
          node note_auto_post.js "$TODAY_ARTICLE" "$NOTE_EMAIL" "$NOTE_PASSWORD" /tmp/.note-state.json --publish --magazine "$NOTE_MAGAZINE_NAME" 2>&1 | tee /tmp/note_post_retry.log
          POST_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          NOTE_ARTICLE_URL=$(python - <<'PY'
          from pathlib import Path
          import re
          path = Path('/tmp/note_post_retry.log')
          text = path.read_text(encoding='utf-8', errors='ignore') if path.exists() else ''
          matches = re.findall(r'^NOTE_ARTICLE_URL=(.+)$', text, re.MULTILINE)
          print(matches[-1] if matches else '')
          PY
          )
          
          if [ $POST_EXIT_CODE -eq 0 ]; then
            echo "✅ Retry: note.com投稿成功"
            if [ -n "$NOTE_ARTICLE_URL" ]; then
              echo "NOTE_ARTICLE_URL=$NOTE_ARTICLE_URL" >> "$GITHUB_ENV"
              echo "📝 Retry note記事URL: $NOTE_ARTICLE_URL"
            else
              echo "⚠️  Retry: note記事URLを抽出できませんでした"
            fi
          else
            echo "❌ Retry: note.com投稿失敗（終了コード: $POST_EXIT_CODE）"
            echo "⚠️  リトライ後も投稿に失敗しました"
          fi

      - name: Retry Summary
        if: always()
        run: |
          echo "=========================================="
          echo "🔄 Retry Job Complete"
          echo "=========================================="
